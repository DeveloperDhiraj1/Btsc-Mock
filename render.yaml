# Render Blueprint for the backend.
# Usage: in Render dashboard, "New +" → "Blueprint" → connect this repo.
# Render will read this file and create the service. You still set
# secret env vars in the dashboard (this file only defines structure).
#
# Frontend deploys separately on Vercel (or as a Render static site).
services:
  - type: web
    name: btsc-mock-backend
    env: node
    region: oregon                 # change to your preferred region
    plan: free                     # upgrade for always-on / no cold-starts
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000               # Render injects PORT — this is just a default
      - key: FRONTEND_URL
        sync: false                # set in dashboard: comma-separated allowed origins
      - key: MONGODB_URI
        sync: false                # set in dashboard
      - key: JWT_SECRET
        sync: false                # set in dashboard — generate fresh, do NOT reuse repo value
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FIREBASE_WEB_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_GEMINI_MOCK
        value: "false"
      - key: REDIS_URL
        sync: false                # leave blank to keep USE_REDIS_MOCK=true
      - key: USE_REDIS_MOCK
        value: "true"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: USE_CLOUDINARY_MOCK
        value: "false"             # MUST be false in prod — Render disk is ephemeral
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: USE_EMAIL_MOCK
        value: "false"
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: USE_RAZORPAY_MOCK
        value: "false"
      - key: SETTINGS_ENCRYPTION_KEY
        sync: false                # 64 hex chars: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
